<!DOCTYPE html>
<html lang="en">
<head>
<title>Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --border: #d4cfc9;
    --border-focus: #1a1a1a;
    --bg: #f7f4f0;
    --card: #ffffff;
    --accent: #c8a96e;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(200, 169, 110, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(26, 26, 26, 0.04) 0%, transparent 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 2rem;
  }

  .card {
    background: var(--card);
    width: 100%;
    max-width: 460px;
    padding: 3rem 3rem 2.5rem;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.04),
      0 8px 32px rgba(0,0,0,0.06),
      0 32px 64px rgba(0,0,0,0.04);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #e8c98a, var(--accent));
  }

  .header {
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }

  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.15;
    letter-spacing: -0.01em;
  }

  .form-group {
    margin-bottom: 1.5rem;
    position: relative;
  }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.55rem;
    transition: color 0.2s;
  }

  .form-group:focus-within label {
    color: var(--ink);
  }

  input {
    width: 100%;
    padding: 0.8rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 0;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    -webkit-appearance: none;
  }

  input::placeholder {
    color: #c4bfb8;
    font-weight: 300;
  }

  input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.05);
  }

  input:valid:not(:placeholder-shown) {
    border-color: var(--accent);
  }

  .submit-btn {
    width: 100%;
    margin-top: 2rem;
    padding: 1rem;
    background: var(--ink);
    color: #ffffff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .submit-btn:hover {
    background: #2e2e2e;
  }

  .submit-btn:hover::after {
    transform: translateX(100%);
  }

  .submit-btn:active {
    background: #111;
  }

  .footer-note {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--border);
    letter-spacing: 0.03em;
  }

  /* Staggered fade-in on load */
  .eyebrow    { animation: fadeUp 0.5s ease both 0.05s; }
  h2          { animation: fadeUp 0.5s ease both 0.12s; }
  .form-group:nth-child(1) { animation: fadeUp 0.5s ease both 0.2s; }
  .form-group:nth-child(2) { animation: fadeUp 0.5s ease both 0.27s; }
  .form-group:nth-child(3) { animation: fadeUp 0.5s ease both 0.34s; }
  .submit-btn { animation: fadeUp 0.5s ease both 0.42s; }
  .footer-note { animation: fadeUp 0.5s ease both 0.5s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <p class="eyebrow">Create Account</p>
      <h2>User<br>Registration</h2>
    </div>

    <form action="/register" method="POST">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required>
      </div>

      <button type="submit" class="submit-btn">Register →</button>
    </form>

    <p class="footer-note">Your information is kept private & secure.</p>
  </div>
</body>
</html>
